<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個性測驗系統</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <!-- Login/Register Page -->
        <div id="auth-page" class="page">
            <div class="container">
                <div class="auth-box">
                    <h1>個性測驗系統</h1>
                    
                    <!-- Login Form -->
                    <div id="login-form" class="form-container">
                        <h2>登入</h2>
                        <input type="text" id="login-username" placeholder="用戶名" class="input-field">
                        <input type="password" id="login-password" placeholder="密碼" class="input-field">
                        <button onclick="login()" class="btn-primary">登入</button>
                        <p>還沒有帳號？<a href="#" onclick="switchToRegister(event)">註冊</a></p>
                        <div id="login-error" class="error-message"></div>
                    </div>

                    <!-- Register Form -->
                    <div id="register-form" class="form-container" style="display: none;">
                        <h2>註冊</h2>
                        <input type="text" id="register-username" placeholder="用戶名" class="input-field">
                        <input type="email" id="register-email" placeholder="電子郵件" class="input-field">
                        <input type="password" id="register-password" placeholder="密碼" class="input-field">
                        <input type="password" id="register-password-confirm" placeholder="確認密碼" class="input-field">
                        <button onclick="register()" class="btn-primary">註冊</button>
                        <p>已有帳號？<a href="#" onclick="switchToLogin(event)">登入</a></p>
                        <div id="register-error" class="error-message"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Test Page -->
        <div id="test-page" class="page" style="display: none;">
            <div class="container">
                <div class="test-header">
                    <h1>個性測驗</h1>
                    <p id="username-display"></p>
                    <button onclick="logout()" class="btn-logout">登出</button>
                </div>

                <div class="test-content">
                    <div id="questions-container"></div>
                    <button onclick="submitTest()" class="btn-primary btn-submit">提交測驗</button>
                </div>
            </div>
        </div>

        <!-- Results Page -->
        <div id="results-page" class="page" style="display: none;">
            <div class="container">
                <div class="results-header">
                    <h1>測驗結果</h1>
                    <button onclick="logout()" class="btn-logout">登出</button>
                </div>

                <div class="results-content">
                    <div class="result-box">
                        <h2 id="personality-type"></h2>
                        <p id="personality-score"></p>
                        <p id="personality-description"></p>
                        <button onclick="retakeTest()" class="btn-primary">重新測驗</button>
                        <button onclick="viewHistory()" class="btn-secondary">查看歷史記錄</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- History Page -->
        <div id="history-page" class="page" style="display: none;">
            <div class="container">
                <div class="history-header">
                    <h1>測驗歷史</h1>
                    <button onclick="logout()" class="btn-logout">登出</button>
                </div>

                <div class="history-content">
                    <div id="history-list"></div>
                    <button onclick="retakeTest()" class="btn-primary">返回首頁</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
